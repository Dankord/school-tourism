<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing page</title>
    <link rel="stylesheet" href="style.css"> </head>

<body>
    <nav class="navbar">
        <div class="navigations">
            <ul class="nav-links">
                <li><a href="#home" class="home-link">Home</a></li>
                <li><a href="#form" class="nav-button">Take Survey</a></li>
                <!-- <li><a href="#contact">Contact</a></li> -->
            </ul>
        </div>
    </nav>
    <main>
        <div class="home-content">
            <div class="title-description">
                <div class="pill">
                    <p class="pill-text">Welcome to EduTourism</p>
                </div>
                <h1>Educational Tourism <br><span class="font-change">Survey Portal</span></h1>
                <p class="sub-heading">Share your experiences from school trips and help improve future learning journeys beyond the classroom.</p>
                <div class="landing-buttons">
                    <a class="survey-button" href="#">Take survey<i class="arrow-right" data-lucide="arrow-right"></i></a>
                    <a class="learn-button" href="#">Learn More</a>
                </div>
            </div>
            <div class="tour-img">
                <img class="cam" src="../img/cam.png" alt="Camera" height="700">
            </div>
        </div>
    </main>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons()</script>
</body>

</html>
