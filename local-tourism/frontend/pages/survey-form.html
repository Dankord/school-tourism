<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/survey-form.css">
</head>

<body>
    <nav class="navbar">
        <a class="back-link" href="landing.html">Back</a>
        <h1>Educational Tourism Survey</h1>
    </nav>
    <main class="main-content">
        <div class="progress">
            <div class="progress-between">
                <p>Step 1-4</p>
                <p>~5 minutes to complete</p>
            </div>
            <div class="progressContainer">
                <div class="progressBar" id="progressBar"></div>
            </div>
        </div>
        <div class="container">
            <div class="form-header">
                <h1>Tell us about your trip</h1>
                <p>Where did your adventure journey take you?</p>
            </div>
            <form id="form" action="../../backend/api/form-submit.php" method="POST">
                <!-- step 1 -->
                <div class="formStep active">
                    <div class="destination-name">
                        <label>Destination Name</label>
                        <input type="text" id="text" class="input-text" name="destination-name" minlength="2" maxlength="50"
                            placeholder="e.g., Boracay, Batanes, Bohol" required>
                    </div>
                    <div class="destination-name">
                        <div class="trip">
                            <label>Province</label>
                            <Select id="province" name="province" class="dropdown" required>
                                <option value="">Select Province</option>
                                <option value="luzon">Luzon</option>
                                <option value="visayas">Visayas</option>
                                <option value="mindanao">Mindanao</option>
                                <option value="others">Others</option>
                            </Select>
                        </div>
                    </div>
                    <div class="trip-dropdown">
                        <div class="trip">
                            <label>When did you visit?</label>
                            <input type="date" id="trip-date" name="trip-date" class="trip-date" required>
                        </div>
                        <div class="trip">
                            <label>Trip Type</label>
                            <Select id="trip-type" name="trip-type" class="duration" required>
                                <option value="">Select Type</option>
                                <option value="school organized">School Organized</option>
                                <option value="family trip">Family Trip</option>
                                <option value="university program">University Program</option>
                                <option value="getaway trip">Getaway trip</option>
                            </Select>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="buttons">
                        <button class="previous disable" type="button" disabled>Previous</button>
                        <button class="next" type="button">Next</button>
                    </div>
                </div>
                <!-- Step 2 -->
                <div class="formStep">
                    <div class="form-likert-scale">
                        <label class="likert-label">How much did you enjoy it?</label>
                        <div class="scale">
                            <input type="radio" id="enjoyment-1" name="satisfaction" class="likert" value="1" required>
                            <label for="enjoyment-1">1</label>
                            <input type="radio" id="enjoyment-2" name="satisfaction" class="likert" value="2">
                            <label for="enjoyment-2">2</label>
                            <input type="radio" id="enjoyment-3" name="satisfaction" class="likert" value="3">
                            <label for="enjoyment-3">3</label>
                            <input type="radio" id="enjoyment-4" name="satisfaction" class="likert" value="4">
                            <label for="enjoyment-4">4</label>
                            <input type="radio" id="enjoyment-5" name="satisfaction" class="likert" value="5">
                            <label for="enjoyment-5">5</label>
                        </div>
                    </div>
                    <div class="form-likert-scale">
                        <label class="likert-label">The trip helped improve your understanding of the local tour
                            spot</label>
                        <div class="scale">
                            <input type="radio" id="understanding-1" name="understanding" class="likert" value="1"
                                required>
                            <label for="understanding-1">1</label>
                            <input type="radio" id="understanding-2" name="understanding" class="likert" value="2">
                            <label for="understanding-2">2</label>
                            <input type="radio" id="understanding-3" name="understanding" class="likert" value="3">
                            <label for="understanding-3">3</label>
                            <input type="radio" id="understanding-4" name="understanding" class="likert" value="4">
                            <label for="understanding-4">4</label>
                            <input type="radio" id="understanding-5" name="understanding" class="likert" value="5">
                            <label for="understanding-5">5</label>
                        </div>
                    </div>
                    <div class="form-likert-scale">
                        <label class="likert-label">The destination was enjoyable and well-maintained</label>
                        <div class="scale">
                            <input type="radio" id="maintenance-1" name="maintenance" class="likert" value="1" required>
                            <label for="maintenance-1">1</label>
                            <input type="radio" id="maintenance-2" name="maintenance" class="likert" value="2">
                            <label for="maintenance-2">2</label>
                            <input type="radio" id="maintenance-3" name="maintenance" class="likert" value="3">
                            <label for="maintenance-3">3</label>
                            <input type="radio" id="maintenance-4" name="maintenance" class="likert" value="4">
                            <label for="maintenance-4">4</label>
                            <input type="radio" id="maintenance-5" name="maintenance" class="likert" value="5">
                            <label for="maintenance-5">5</label>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="buttons">
                        <button class="previous" type="button">Previous</button>
                        <button class="next" type="button">Next</button>
                    </div>
                </div>
                <!-- Step 3 -->
                <div class="formStep">
                    <div class="form-likert-scale">
                        <label class="likert-label">The destination was accessible and convenient to travel to.</label>
                        <div class="scale">
                            <input type="radio" id="transportation-1" name="transportation" class="likert" value="1"
                                required>
                            <label for="transportation-1">1</label>
                            <input type="radio" id="transportation-2" name="transportation" class="likert" value="2">
                            <label for="transportation-2">2</label>
                            <input type="radio" id="transportation-3" name="transportation" class="likert" value="3">
                            <label for="transportation-3">3</label>
                            <input type="radio" id="transportation-4" name="transportation" class="likert" value="4">
                            <label for="transportation-4">4</label>
                            <input type="radio" id="transportation-5" name="transportation" class="likert" value="5">
                            <label for="transportation-5">5</label>
                        </div>
                    </div>
                    <div class="form-likert-scale">
                        <label class="likert-label">The trip was affordable and worth the cost.</label>
                        <div class="scale">
                            <input type="radio" id="affordable-1" name="affordable" class="likert" value="1" required>
                            <label for="affordable-1">1</label>
                            <input type="radio" id="affordable-2" name="affordable" class="likert" value="2">
                            <label for="affordable-2">2</label>
                            <input type="radio" id="affordable-3" name="affordable" class="likert" value="3">
                            <label for="affordable-3">3</label>
                            <input type="radio" id="affordable-4" name="affordable" class="likert" value="4">
                            <label for="affordable-4">4</label>
                            <input type="radio" id="affordable-5" name="affordable" class="likert" value="5">
                            <label for="affordable-5">5</label>
                        </div>
                    </div>
                    <div class="form-likert-scale">
                        <label class="likert-label">Local facilities and services met my expectation.</label>
                        <div class="scale">
                            <input type="radio" id="facilities-1" name="facilities" class="likert" value="1" required>
                            <label for="facilities-1">1</label>
                            <input type="radio" id="facilities-2" name="facilities" class="likert" value="2">
                            <label for="facilities-2">2</label>
                            <input type="radio" id="facilities-3" name="facilities" class="likert" value="3">
                            <label for="facilities-3">3</label>
                            <input type="radio" id="facilities-4" name="facilities" class="likert" value="4">
                            <label for="facilities-4">4</label>
                            <input type="radio" id="facilities-5" name="facilities" class="likert" value="5">
                            <label for="facilities-5">5</label>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="buttons">
                        <button class="previous" type="button">Previous</button>
                        <button class="next" type="button">Next</button>
                    </div>
                </div>
                <!-- Step 4 -->
                <div class="formStep">
                    <div class="form-recommendation">
                        <label>Would you recommend this place to others?</label>
                        <div class="form-recommend">
                            <label for="rec-yes"><input type="radio" id="rec-yes" name="recommendation"
                                    class="recommend-radio" value="yes" required>Yes</label>
                            <label for="rec-no"><input type="radio" id="rec-no" name="recommendation"
                                    class="recommend-radio" value="no" required>No</label>
                        </div>
                    </div>
                    <div class="form-textArea">
                        <label>What problems or issues did you encounter during the trip??</label>
                        <textarea id="problems" name="issues"
                            placeholder="Any issue you have run into during your trip..."></textarea>
                    </div>
                    <div class="form-textArea">
                        <label>What suggestions can you give to improve future trips?</label>
                        <textarea id="addition" name="suggestion"
                            placeholder="Any suggestion for future travelers..."></textarea>
                    </div>
                    <div class="divider"></div>
                    <div class="buttons">
                        <button class="previous" type="button">Previous</button>
                        <button class="next" type="submit">Submit</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
    <div id="formToast" class="form-toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>
    <script src="../assets/js/survey-form.js"></script>
</body>

</html>
